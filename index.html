<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>カウンター</title>
<style>
  body { font-family: sans-serif; padding: 20px; }

  table {
    border-collapse: collapse;
    width: 100%;
    margin-bottom: 20px;
  }

  th, td {
    border: 1px solid #ccc;
    padding: 8px;
    text-align: center;
  }

  button { margin: 2px; }

  .controls { margin-bottom: 10px; }
</style>
</head>
<body>

<h1>カウンター</h1>

<div class="controls">
  <button onclick="undo()">1つ戻る</button>
  <button onclick="resetAll()">リセット</button>
  <button onclick="fullReset()">完全リセット</button>
</div>

<h3>個人追加</h3>
<input id="newPerson" placeholder="名前">
<button onclick="addPerson()">追加</button>

<div id="app"></div>

<script>
const items = ["a", "b", "c", "d"];
const sets = ["レセプション", "サーブ", "アタック"];

let data = JSON.parse(localStorage.getItem("data")) || {};
let history = [];

// 初期化
sets.forEach(s => {
  if (!data[s]) data[s] = {};
});

// 保存
function save() {
  localStorage.setItem("data", JSON.stringify(data));
}

// 履歴
function saveHistory() {
  history.push(JSON.stringify(data));
  if (history.length > 200) history.shift();
}

// 表示
function render() {
  const app = document.getElementById("app");
  app.innerHTML = "";

  sets.forEach(s => {
    const div = document.createElement("div");

    let html = `<h2>${s}</h2>`;
    html += `<table>`;
    html += `
      <tr>
        <th>名前</th>
        ${items.map(i => `<th>${i}</th>`).join("")}
        <th>合計</th>
        <th>計算</th>
      </tr>
    `;

    Object.keys(data[s]).forEach(p => {
      let total = 0;

      let row = `<tr><td>${p}</td>`;

      items.forEach(i => {
        if (!data[s][p][i]) data[s][p][i] = 0;
        total += data[s][p][i];

        row += `
          <td>
            ${data[s][p][i]}<br>
            <button onclick="inc('${s}','${p}','${i}')">+1</button>
          </td>
        `;
      });

      const result = total * 2;

      row += `<td>${total}</td>`;
      row += `<td>${result}</td>`;
      row += `</tr>`;

      html += row;
    });

    html += `</table>`;
    div.innerHTML = html;
    app.appendChild(div);
  });
}

// カウント
function inc(s, p, i) {
  saveHistory();
  data[s][p][i]++;
  save();
  render();
}

// Undo
function undo() {
  if (history.length === 0) return alert("戻れない");

  data = JSON.parse(history.pop());
  save();
  render();
}

// リセット（数値だけ）
function resetAll() {
  if (!confirm("リセットする？")) return;

  saveHistory();

  sets.forEach(s => {
    Object.keys(data[s]).forEach(p => {
      items.forEach(i => data[s][p][i] = 0);
    });
  });

  save();
  render();
}

// 完全リセット
function fullReset() {
  if (!confirm("完全削除する？")) return;

  data = {};
  history = [];
  localStorage.removeItem("data");

  sets.forEach(s => data[s] = {});
  save();
  render();
}

// 個人追加
function addPerson() {
  const name = document.getElementById("newPerson").value.trim();
  if (!name) return;

  sets.forEach(s => {
    if (!data[s][name]) {
      data[s][name] = {};
      items.forEach(i => data[s][name][i] = 0);
    }
  });

  document.getElementById("newPerson").value = "";
  save();
  render();
}

render();
</script>

</body>
</html>
