<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>バレーデータ</title>

<style>
body {
  font-family: "Segoe UI", sans-serif;
  padding: 20px;
  background: #f5f5f7;
  color: #333;
}

/* タブ */
.tabbar {
  margin-bottom: 15px;
}
.tab-item {
  display: inline-flex;
  align-items: center;
  margin-right: 10px;
}
.tabbar button {
  padding: 10px 18px;
  border: none;
  border-radius: 6px;
  background: #e0e0e0;
  cursor: pointer;
  font-size: 15px;
  margin-left: 4px;
}
.tabbar .active {
  background: #4a90e2;
  color: white;
  font-weight: bold;
}

/* セクションカード */
.section-card {
  background: white;
  padding: 16px;
  margin-bottom: 25px;
  border-radius: 10px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

/* 表 */
table {
  border-collapse: collapse;
  width: 100%;
  margin-top: 10px;
}
th {
  background: #4a90e2;
  color: white;
  padding: 8px;
  font-size: 14px;
}
td {
  border: 1px solid #ddd;
  padding: 6px;
  background: #fff;
}

/* ボタン */
button {
  padding: 6px 10px;
  border-radius: 6px;
  border: none;
  cursor: pointer;
}
button:hover { opacity: 0.85; }
.btn-main { background: #4a90e2; color: white; }
.btn-danger { background: #e74c3c; color: white; }
.btn-gray { background: #aaa; color: white; }

/* 入力欄 */
input {
  padding: 10px;
  font-size: 16px;
  width: 200px;
  border-radius: 6px;
  border: 1px solid #ccc;
  margin-right: 6px;
}

/* ===== スクショモード ===== */
.screenshot td {
  font-size: 22px;
  padding: 12px;
}
.screenshot button {
  display: none;
}
</style>
</head>
<body>

<div class="tabbar" id="tabbar"></div>
<button class="btn-main" onclick="addSet()">＋セット追加</button>
<button class="btn-gray" onclick="toggleScreenshot()">スクショモード切替</button>
<button class="btn-main" onclick="mergeSets()">選択セット合算</button>
<button class="btn-danger" onclick="clearMerge()">合算結果を消す</button>
<button class="btn-danger" onclick="deleteSelectedSets()">選択セット削除</button>

<hr>

<button class="btn-gray" onclick="undo()">1つ戻る</button>
<button class="btn-gray" onclick="resetAll()">リセット</button>
<button class="btn-danger" onclick="fullReset()">完全リセット</button>

<h3>個人追加</h3>
<input id="newPerson" placeholder="名前">
<button class="btn-main" onclick="addPerson()">追加</button>

<div id="app"></div>
<div id="mergeResult"></div>

<script>

/* ====== 設定 ====== */
const config = {
  "レセプション": ["a","b","c","dm"],
  "サーブ": ["◎","○","△","✕"],
  "アタック": ["◎","○","△","✕","B"]
};
const sections = Object.keys(config);

/* ====== データ ====== */
let db = JSON.parse(localStorage.getItem("db_tabs")) || [];
let current = 0;
let history = [];
let mergeCache = null;

/* ====== 保存 ====== */
function save(){ localStorage.setItem("db_tabs", JSON.stringify(db)); }
function saveHistory(){
  history.push(JSON.stringify(db));
  if(history.length > 200) history.shift();
}

/* ====== セット追加 ====== */
function addSet(){
  const newSet = { name: "セット" + (db.length+1) };
  sections.forEach(s => newSet[s] = {});
  db.push(newSet);
  current = db.length - 1;
  save();
  render();
}

/* ====== タブ描画 ====== */
function renderTabs(){
  const bar = document.getElementById("tabbar");
  bar.innerHTML = "";

  db.forEach((set,i)=>{
    const wrap = document.createElement("span");
    wrap.className = "tab-item";

    const chk = document.createElement("input");
    chk.type = "checkbox";
    chk.className = "tab-check";
    chk.dataset.index = i;

    const b = document.createElement("button");
    b.textContent = set.name || ("セット" + (i+1));
    if(i === current) b.classList.add("active");

    b.ondblclick = ()=>{
      const newName = prompt("セット名を入力", b.textContent);
      if(newName){
        db[i].name = newName;
        save();
        renderTabs();
      }
    };

    b.onclick = ()=>{ current = i; render(); };

    wrap.appendChild(chk);
    wrap.appendChild(b);
    bar.appendChild(wrap);
  });
}

/* ====== 計算補助 ====== */
function safeDiv(a,b){ return b===0 ? 0 : a/b; }
function pct(v){ return (v*100).toFixed(1)+"%"; }

/* ====== 描画 ====== */
function render(){
  renderTabs();

  if(db.length === 0){
    document.getElementById("app").innerHTML = "セットがありません";
    return;
  }

  const data = db[current];
  let html = "";

  sections.forEach(s=>{
    const items = config[s];

    html += `<div class="section-card"><h2>${s}</h2><table>`;
    html += `<tr><th>名前</th>`;
    items.forEach(i=> html+=`<th>${i}</th>`);
    html += `<th>合計</th>`;

    if(s==="レセプション"){
      html += `<th>ab率</th><th>a率</th><th>dm率</th>`;
    }
    if(s==="サーブ"){
      html += `<th>効果率</th><th>ミス率</th>`;
    }
    if(s==="アタック"){
      html += `<th>配給率</th><th>決定率</th><th>効果率</th><th>ミス率</th>`;
    }
    html += `</tr>`;

    let teamTotal = 0;
    Object.keys(data[s]).forEach(p=>{
      items.forEach(i=> teamTotal += (data[s][p][i]||0));
    });

    Object.keys(data[s]).forEach(p=>{
      let total = 0;
      let row = `<tr><td>${p}<br><button class="btn-danger" onclick="removePerson('${p}')">削除</button></td>`;

      items.forEach(i=>{
        total += data[s][p][i];
        row += `<td>${data[s][p][i]}<br><button class="btn-main" onclick="inc('${s}','${p}','${i}')">+1</button></td>`;
      });

      row += `<td>${total}</td>`;

      if(s==="レセプション"){
        const a=data[s][p]["a"]||0;
        const b=data[s][p]["b"]||0;
        const dm=data[s][p]["dm"]||0;
        row += `<td>${pct(safeDiv(a+b,total))}</td>`;
        row += `<td>${pct(safeDiv(a,total))}</td>`;
        row += `<td>${pct(safeDiv(dm,total))}</td>`;
      }

      if(s==="サーブ"){
        const good=(data[s][p]["◎"]||0)+(data[s][p]["○"]||0);
        const miss=data[s][p]["✕"]||0;
        row += `<td>${pct(safeDiv(good-miss,total))}</td>`;
        row += `<td>${pct(safeDiv(miss,total))}</td>`;
      }

      if(s==="アタック"){
        const good=data[s][p]["◎"]||0;
        const miss=data[s][p]["✕"]||0;
        const 決定率=safeDiv(good,total);
        const ミス率=safeDiv(miss,total);
        const 効果率=決定率-ミス率;
        const 配給率=safeDiv(total,teamTotal);

        row += `<td>${pct(配給率)}</td>`;
        row += `<td>${pct(決定率)}</td>`;
        row += `<td>${pct(効果率)}</td>`;
        row += `<td>${pct(ミス率)}</td>`;
      }

      row += `</tr>`;
      html += row;
    });

    html += `</table></div>`;
  });

  document.getElementById("app").innerHTML = html;
}

/* ====== 操作 ====== */
function inc(s,p,i){
  saveHistory();
  db[current][s][p][i]++;
  save();
  render();
}

function undo(){
  if(!history.length) return;
  db = JSON.parse(history.pop());
  save();
  render();
}

function resetAll(){
  if(!confirm("リセットする？")) return;
  saveHistory();
  sections.forEach(s=>{
    Object.keys(db[current][s]).forEach(p=>{
      config[s].forEach(i=> db[current][s][p][i]=0);
    });
  });
  save();
  render();
}

function fullReset(){
  if(!confirm("完全削除する？")) return;
  db = [];
  history = [];
  save();
  render();
}

function addPerson(){
  const name = newPerson.value.trim();
  if(!name) return;

  sections.forEach(s=>{
    if(!db[current][s][name]){
      db[current][s][name] = {};
      config[s].forEach(i=> db[current][s][name][i]=0);
    }
  });

  newPerson.value = "";
  save();
  render();
}

function removePerson(name){
  if(!confirm(name+"を削除する？")) return;
  saveHistory();
  sections.forEach(s=> delete db[current][s][name]);
  save();
  render();
}

/* ====== スクショモード ====== */
let screenshotMode = false;

function toggleScreenshot(){
  screenshotMode = !screenshotMode;
  const app = document.getElementById("app");
  if(screenshotMode){
    app.classList.add("screenshot");
  } else {
    app.classList.remove("screenshot");
  }
}

/* ====== 合算機能 ====== */
function mergeSets(){
  const checkboxes = document.querySelectorAll(".tab-check");
  const selected = [];

  checkboxes.forEach((c,i)=>{
    if(c.checked) selected.push(i);
  });

  if(selected.length === 0){
    alert("合算するセットを選んでください");
    return;
  }

  const result = {};
  sections.forEach(s=>{
    result[s] = {};
  });

  selected.forEach(idx=>{
    const set = db[idx];
    sections.forEach(s=>{
      Object.keys(set[s]).forEach(p=>{
        if(!result[s][p]){
          result[s][p] = {};
          config[s].forEach(i=> result[s][p][i] = 0);
        }
        config[s].forEach(i=>{
          result[s][p][i] += set[s][p][i];
        });
      });
    });
  });

  mergeCache = result;
  renderMergedResult();
}

/* ====== 合算結果描画 ====== */
function renderMergedResult(){
  if(!mergeCache) return;

  const result = mergeCache;
  let html = `<h2>合算結果</h2>`;

  sections.forEach(s=>{
    const items = config[s];
    html += `<div class="section-card"><h3>${s}</h3><table>`;
    html += `<tr><th>名前</th>`;
    items.forEach(i=> html+=`<th>${i}</th>`);
    html += `<th>合計</th>`;

    if(s==="レセプション"){
      html += `<th>ab率</th><th>a率</th><th>dm率</th>`;
    }
    if(s==="サーブ"){
      html += `<th>効果率</th><th>ミス率</th>`;
    }
    if(s==="アタック"){
      html += `<th>配給率</th><th>決定率</th><th>効果率</th><th>ミス率</th>`;
    }
    html += `</tr>`;

    let teamTotal = 0;
    Object.keys(result[s]).forEach(p=>{
      items.forEach(i=> teamTotal += result[s][p][i]);
    });

    Object.keys(result[s]).forEach(p=>{
      let total = 0;
      let row = `<tr><td>${p}</td>`;

      items.forEach(i=>{
        total += result[s][p][i];
        row += `<td>${result[s][p][i]}</td>`;
      });

      row += `<td>${total}</td>`;

      if(s==="レセプション"){
        const a=result[s][p]["a"]||0;
        const b=result[s][p]["b"]||0;
        const dm=result[s][p]["dm"]||0;
        row += `<td>${pct(safeDiv(a+b,total))}</td>`;
        row += `<td>${pct(safeDiv(a,total))}</td>`;
        row += `<td>${pct(safeDiv(dm,total))}</td>`;
      }

      if(s==="サーブ"){
        const good=(result[s][p]["◎"]||0)+(result[s][p]["○"]||0);
        const miss=result[s][p]["✕"]||0;
        row += `<td>${pct(safeDiv(good-miss,total))}</td>`;
        row += `<td>${pct(safeDiv(miss,total))}</td>`;
      }

      if(s==="アタック"){
        const good=result[s][p]["◎"]||0;
        const miss=result[s][p]["✕"]||0;
        const 決定率=safeDiv(good,total);
        const ミス率=safeDiv(miss,total);
        const 効果率=決定率-ミス率;
        const 配給率=safeDiv(total,teamTotal);

        row += `<td>${pct(配給率)}</td>`;
        row += `<td>${pct(決定率)}</td>`;
        row += `<td>${pct(効果率)}</td>`;
        row += `<td>${pct(ミス率)}</td>`;
      }

      row += `</tr>`;
      html += row;
    });

    html += `</table></div>`;
  });

  document.getElementById("mergeResult").innerHTML = html;
}

/* ====== 合算結果クリア ====== */
function clearMerge(){
  mergeCache = null;
  document.getElementById("mergeResult").innerHTML = "";
}

/* ====== 選択セット削除 ====== */
function deleteSelectedSets(){
  const checks = document.querySelectorAll(".tab-check");
  const selected = [];

  checks.forEach((c,i)=>{
    if(c.checked) selected.push(i);
  });

  if(selected.length === 0){
    alert("削除するセットを選んでください");
    return;
  }

  if(!confirm(selected.length + "件のセットを削除しますか？")) return;

  selected.sort((a,b)=>b-a).forEach(i=>{
    db.splice(i,1);
  });

  if(current >= db.length){
    current = db.length - 1;
  }
  if(current < 0) current = 0;

  save();
  render();
}

render();
</script>

</body>
</html>
