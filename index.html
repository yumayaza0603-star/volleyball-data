<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>カウンター（タブ対応）</title>
<style>
body { font-family: sans-serif; padding: 20px; }

table {
  border-collapse: collapse;
  width: 100%;
  margin-bottom: 20px;
}

th, td {
  border: 1px solid #ccc;
  padding: 6px;
  text-align: center;
  font-size: 14px;
}

button { margin: 2px; }

input {
  padding: 10px;
  font-size: 16px;
  width: 200px;
}

.tabbar button {
  padding: 8px 14px;
  margin-right: 6px;
  border: 1px solid #aaa;
  background: #eee;
  cursor: pointer;
}

.tabbar .active {
  background: #ccc;
  font-weight: bold;
}
</style>
</head>
<body>

<h1>カウンター（タブ対応）</h1>

<div class="tabbar" id="tabbar"></div>
<button onclick="addSet()">＋セット追加</button>

<hr>

<button onclick="undo()">1つ戻る</button>
<button onclick="resetAll()">リセット</button>
<button onclick="fullReset()">完全リセット</button>

<h3>個人追加</h3>
<input id="newPerson" placeholder="名前">
<button onclick="addPerson()">追加</button>

<div id="app"></div>

<script>

// ====== 設定 ======
const config = {
  "レセプション": ["a","b","c","dm"],
  "サーブ": ["◎","○","△","✕"],
  "アタック": ["◎","○","△","✕","B"]
};

const sections = Object.keys(config);

// ====== データ構造 ======
let db = JSON.parse(localStorage.getItem("db_tabs")) || [];
let current = 0;
let history = [];

// ====== 保存 ======
function save(){
  localStorage.setItem("db_tabs", JSON.stringify(db));
}

function saveHistory(){
  history.push(JSON.stringify(db));
  if(history.length > 200) history.shift();
}

// ====== セット追加 ======
function addSet(){
  const newSet = {};
  sections.forEach(s => newSet[s] = {});
  db.push(newSet);
  current = db.length - 1;
  save();
  render();
}

// ====== タブ描画 ======
function renderTabs(){
  const bar = document.getElementById("tabbar");
  bar.innerHTML = "";

  db.forEach((_,i)=>{
    const b = document.createElement("button");
    b.textContent = "セット" + (i+1);
    if(i === current) b.classList.add("active");
    b.onclick = ()=>{ current = i; render(); };
    bar.appendChild(b);
  });
}

// ====== 計算補助 ======
function safeDiv(a,b){ return b===0 ? 0 : a/b; }
function pct(v){ return (v*100).toFixed(1)+"%"; }

// ====== 描画 ======
function render(){
  renderTabs();

  if(db.length === 0){
    document.getElementById("app").innerHTML = "セットがありません";
    return;
  }

  const data = db[current];
  let html = "";

  sections.forEach(s=>{
    const items = config[s];
    html += `<h2>${s}</h2><table>`;

    html += `<tr><th>名前</th>`;
    items.forEach(i=> html+=`<th>${i}</th>`);
    html += `<th>合計</th>`;

    if(s==="レセプション"){
      html += `<th>ab率</th><th>a率</th><th>dm率</th>`;
    }
    if(s==="サーブ"){
      html += `<th>効果率</th><th>ミス率</th>`;
    }
    if(s==="アタック"){
      html += `<th>配給率</th><th>決定率</th><th>効果率</th><th>ミス率</th>`;
    }

    html += `</tr>`;

    // チーム合計計算
    let teamTotal = 0;
    Object.keys(data[s]).forEach(p=>{
      items.forEach(i=> teamTotal += (data[s][p][i]||0));
    });

    // 各人
    Object.keys(data[s]).forEach(p=>{
      let total = 0;
      let row = `<tr><td>${p}<br><button onclick="removePerson('${p}')">削除</button></td>`;

      items.forEach(i=>{
        total += data[s][p][i];
        row += `<td>${data[s][p][i]}<br><button onclick="inc('${s}','${p}','${i}')">+1</button></td>`;
      });

      row += `<td>${total}</td>`;

      if(s==="レセプション"){
        const a=data[s][p]["a"]||0;
        const b=data[s][p]["b"]||0;
        const dm=data[s][p]["dm"]||0;
        row += `<td>${pct(safeDiv(a+b,total))}</td>`;
        row += `<td>${pct(safeDiv(a,total))}</td>`;
        row += `<td>${pct(safeDiv(dm,total))}</td>`;
      }

      if(s==="サーブ"){
        const good=(data[s][p]["◎"]||0)+(data[s][p]["○"]||0);
        const miss=data[s][p]["✕"]||0;
        row += `<td>${pct(safeDiv(good-miss,total))}</td>`;
        row += `<td>${pct(safeDiv(miss,total))}</td>`;
      }

      if(s==="アタック"){
        const good=data[s][p]["◎"]||0;
        const miss=data[s][p]["✕"]||0;
        const 決定率=safeDiv(good,total);
        const ミス率=safeDiv(miss,total);
        const 効果率=決定率-ミス率;
        const 配給率=safeDiv(total,teamTotal);

        row += `<td>${pct(配給率)}</td>`;
        row += `<td>${pct(決定率)}</td>`;
        row += `<td>${pct(効果率)}</td>`;
        row += `<td>${pct(ミス率)}</td>`;
      }

      row += `</tr>`;
      html += row;
    });

    html += `</table>`;
  });

  document.getElementById("app").innerHTML = html;
}

// ====== 操作 ======
function inc(s,p,i){
  saveHistory();
  db[current][s][p][i]++;
  save();
  render();
}

function undo(){
  if(!history.length) return;
  db = JSON.parse(history.pop());
  save();
  render();
}

function resetAll(){
  if(!confirm("リセットする？")) return;
  saveHistory();
  sections.forEach(s=>{
    Object.keys(db[current][s]).forEach(p=>{
      config[s].forEach(i=> db[current][s][p][i]=0);
    });
  });
  save();
  render();
}

function fullReset(){
  if(!confirm("完全削除する？")) return;
  db = [];
  history = [];
  save();
  render();
}

function addPerson(){
  const name = newPerson.value.trim();
  if(!name) return;

  sections.forEach(s=>{
    if(!db[current][s][name]){
      db[current][s][name] = {};
      config[s].forEach(i=> db[current][s][name][i]=0);
    }
  });

  newPerson.value = "";
  save();
  render();
}

function removePerson(name){
  if(!confirm(name+"を削除する？")) return;
  saveHistory();
  sections.forEach(s=> delete db[current][s][name]);
  save();
  render();
}

render();

</script>

</body>
</html>
