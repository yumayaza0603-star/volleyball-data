<!DOCTYPE html>
<html lang="ja">
<heahead>
<meta charset="UTF-8">
<title>記録</title>
<style>
body { font-family: sans-serif; padding:10px; }
button { margin:2px; }
input { margin:4px; }
.active { background:#ddd; }
.hide button:not(.toggle){ display:none; }
.hide { font-size:18px; }
.tab span { margin-right:6px; }
</style>
</head>
<body>

<button class="toggle" onclick="toggleView()">表示切替</button>

<h3>人追加</h3>
<input id="person">
<button onclick="addPerson()">追加</button>

<hr>

<button onclick="addSet()">＋セット</button>
<label><input type="checkbox" id="inherit">人引き継ぎ</label>

<div id="tabs" class="tab"></div>

<h3>タイトル</h3>
<input id="titleInput" oninput="changeTitle()">

<div id="app"></div>

<hr>

<button onclick="merge()">選択合算</button>

<div id="result"></div>

<script>

const cfg={
r:["a","b","c","dm"],
s:["◎","○","△","✕"],
a:["◎","○","△","✕","B"]
};

let db=JSON.parse(localStorage.getItem("db"))||[];
let current=0;

// ===== 保存 =====
function save(){
localStorage.setItem("db",JSON.stringify(db));
}

// ===== 表示切替 =====
function toggleView(){
document.body.classList.toggle("hide");
}

// ===== セット追加 =====
function addSet(){
let set={title:"セット"+(db.length+1),r:{},s:{},a:{}};

if(inherit.checked && db.length){
let last=db[db.length-1];
Object.keys(last.r).forEach(p=>{
set.r[p]={a:0,b:0,c:0,dm:0};
set.s[p]={"◎":0,"○":0,"△":0,"✕":0};
set.a[p]={"◎":0,"○":0,"△":0,"✕":0,"B":0};
});
}

db.push(set);
current=db.length-1;
render();
save();
}

// ===== 人追加 =====
function addPerson(){
const name=person.value;
if(!name)return;

db.forEach(set=>{
if(!set.r[name]){
set.r[name]={a:0,b:0,c:0,dm:0};
set.s[name]={"◎":0,"○":0,"△":0,"✕":0};
set.a[name]={"◎":0,"○":0,"△":0,"✕":0,"B":0};
}
});

person.value="";
render();
save();
}

// ===== タブ =====
function renderTabs(){
tabs.innerHTML="";
db.forEach((s,i)=>{
let wrap=document.createElement("span");

// チェック
let chk=document.createElement("input");
chk.type="checkbox";
chk.className="sel";
chk.dataset.i=i;

// ボタン
let b=document.createElement("button");
b.textContent=s.title||("セット"+(i+1));
if(i===current)b.className="active";
b.onclick=()=>{current=i;render();};

wrap.appendChild(chk);
wrap.appendChild(b);
tabs.appendChild(wrap);
});
}

// ===== タイトル変更 =====
function changeTitle(){
if(!db[current])return;
db[current].title=titleInput.value;
renderTabs();
save();
}

// ===== 表 =====
function render(){
renderTabs();

if(!db.length){
app.innerHTML="データなし";
return;
}

titleInput.value=db[current].title||"";

let set=db[current];
let html="";
html+=table(set.r,cfg.r,"r");
html+=table(set.s,cfg.s,"s");
html+=table(set.a,cfg.a,"a");

app.innerHTML=html;
}

function table(data,items,t){
let h="<table border=1><tr><th>名前</th>";
items.forEach(x=>h+=`<th>${x}</th>`);
h+="<th>計算</th></tr>";

Object.keys(data).forEach(p=>{
let total=0;
items.forEach(x=>total+=(data[p][x]||0));

h+=`<tr><td>${p}</td>`;
items.forEach(x=>{
h+=`<td>${data[p][x]||0}
<button onclick="inc('${t}','${p}','${x}')">+</button></td>`;
});

h+=`<td>${calc(t,data[p],total)}</td></tr>`;
});

h+="</table>";
return h;
}

// ===== 計算 =====
function calc(t,d,total){
if(total==0)return "-";

if(t=="r"){
return `ab:${pct((d.a+d.b)/total)} a:${pct(d.a/total)} dm:${pct(d.dm/total)}`;
}
if(t=="s"){
return `効:${pct(((d["◎"]+d["○"])-d["✕"])/total)} ミ:${pct(d["✕"]/total)}`;
}
if(t=="a"){
let dec=d["◎"]/total;
let miss=d["✕"]/total;
return `決:${pct(dec)} 効:${pct(dec-miss)} ミ:${pct(miss)}`;
}
}

function pct(x){
return (x*100).toFixed(1)+"%";
}

// ===== カウント =====
function inc(t,p,x){
let set=db[current];
if(!set[t][p])set[t][p]={};
if(!set[t][p][x])set[t][p][x]=0;
set[t][p][x]++;
save();
render();
}

// ===== 合算（選択のみ）=====
function merge(){
let res={r:{},s:{},a:{}};

let selected=[...document.querySelectorAll(".sel:checked")];

if(selected.length===0){
alert("セットを選択して");
return;
}

selected.forEach(c=>{
let set=db[c.dataset.i];

["r","s","a"].forEach(t=>{
Object.keys(set[t]).forEach(p=>{
if(!res[t][p])res[t][p]={};
Object.keys(set[t][p]).forEach(x=>{
res[t][p][x]=(res[t][p][x]||0)+set[t][p][x];
});
});
});
});

let html="<h3>合算結果</h3>";
html+=table(res.r,cfg.r);
html+=table(res.s,cfg.s);
html+=table(res.a,cfg.a);

result.innerHTML=html;
}

// ===== 初期表示 =====
render();

</script>

</body>
</html>
