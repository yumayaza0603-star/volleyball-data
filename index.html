<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>バレーデータ</title>

<style>
body {
  font-family: "Segoe UI", sans-serif;
  padding: 20px;
  background: #f5f5f7;
  color: #333;
}

/* タブ */
.tabbar {
  margin-bottom: 15px;
}
.tab-item {
  display: inline-flex;
  align-items: center;
  margin-right: 10px;
}
.tabbar button {
  padding: 10px 18px;
  border: none;
  border-radius: 6px;
  background: #e0e0e0;
  cursor: pointer;
  font-size: 15px;
  margin-left: 4px;
}
.tabbar .active {
  background: #4a90e2;
  color: white;
  font-weight: bold;
}

/* セクションカード */
.section-card {
  background: white;
  padding: 16px;
  margin-bottom: 25px;
  border-radius: 10px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

/* 表 */
table {
  border-collapse: collapse;
  width: 100%;
  margin-top: 10px;
}
th {
  background: #4a90e2;
  color: white;
  padding: 8px;
  font-size: 14px;
}
td {
  border: 1px solid #ddd;
  padding: 6px;
  background: #fff;
}

/* ボタン */
button {
  padding: 6px 10px;
  border-radius: 6px;
  border: none;
  cursor: pointer;
}
button:hover { opacity: 0.85; }
.btn-main { background: #4a90e2; color: white; }
.btn-danger { background: #e74c3c; color: white; }
.btn-gray { background: #aaa; color: white; }

/* 入力欄 */
input {
  padding: 10px;
  font-size: 16px;
  width: 200px;
  border-radius: 6px;
  border: 1px solid #ccc;
  margin-right: 6px;
}

/* ===== スクショモード ===== */
.screenshot td {
  font-size: 22px;
  padding: 12px;
}
.screenshot button {
  display: none;
}
</style>
</head>
<body>

<div class="tabbar" id="tabbar">
