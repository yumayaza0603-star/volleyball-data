<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>記録</title>
<style>
body { font-family: sans-serif; padding:10px; }
button { margin:2px; }
input { margin:4px; }
.box { border:1px solid #ccc; margin:10px 0; padding:10px; }
.active { background:#ddd; }

.hide button:not(.toggle){ display:none; }
.hide { font-size:18px; }
</style>
</head>
<body>

<button class="toggle" onclick="toggleView()">表示切替</button>

<h3>カテゴリ</h3>
<input id="catInput" placeholder="カテゴリ">
<button onclick="addCategory()">追加</button>
<div id="cats"></div>

<h3>日付</h3>
<input type="date" id="date">

<h3>相手</h3>
<input id="opponent">
<button onclick="addMatch()">追加</button>
<div id="matches"></div>

<button onclick="addSet()">＋セット</button>
<label><input type="checkbox" id="inherit">人引き継ぎ</label>

<div id="sets"></div>

<hr>
<button onclick="merge()">合算</button>
<button onclick="del()">削除</button>

<div id="result"></div>

<script>

const cfg={
r:["a","b","c","dm"],
s:["◎","○","△","✕"],
a:["◎","○","△","✕","B"]
};

let db=JSON.parse(localStorage.getItem("db"))||{};
let curCat="",curDate="",curMatch="";
document.getElementById("date").value=new Date().toISOString().split("T")[0];

function save(){localStorage.setItem("db",JSON.stringify(db));}

function toggleView(){document.body.classList.toggle("hide");}

// ===== カテゴリ =====
function addCategory(){
const n=catInput.value;
if(!n)return;
if(!db[n])db[n]={};
curCat=n;
renderCats();save();
}

function renderCats(){
cats.innerHTML="";
Object.keys(db).forEach(c=>{
let b=document.createElement("button");
b.textContent=c;
if(c==curCat)b.className="active";
b.onclick=()=>{curCat=c;renderMatches();};
cats.appendChild(b);
});
}

// ===== 相手 =====
function addMatch(){
curDate=date.value;
const n=opponent.value;
if(!n)return;

if(!db[curCat][curDate])db[curCat][curDate]={};
if(!db[curCat][curDate][n])db[curCat][curDate][n]=[];

curMatch=n;
renderMatches();renderSets();save();
}

function renderMatches(){
matches.innerHTML="";
if(!db[curCat]||!db[curCat][date.value])return;

Object.keys(db[curCat][date.value]).forEach(m=>{
let b=document.createElement("button");
b.textContent=m;
if(m==curMatch)b.className="active";
b.onclick=()=>{curMatch=m;renderSets();};
matches.appendChild(b);
});
}

// ===== セット =====
function addSet(){
if(!curMatch)return;

let set={r:{},s:{},a:{}};

if(inherit.checked){
let arr=db[curCat][date.value][curMatch];
if(arr.length){
let last=arr[arr.length-1];
Object.keys(last.r).forEach(p=>{
set.r[p]={a:0,b:0,c:0,dm:0};
set.s[p]={"◎":0,"○":0,"△":0,"✕":0};
set.a[p]={"◎":0,"○":0,"△":0,"✕":0,"B":0};
});
}
}

db[curCat][date.value][curMatch].push(set);
renderSets();save();
}

function renderSets(){
sets.innerHTML="";
if(!curMatch)return;

db[curCat][date.value][curMatch].forEach((set,i)=>{
let d=document.createElement("div");
d.className="box";

d.innerHTML=`<h4><input type="checkbox" class="sel" data-i="${i}">セット${i+1}</h4>`;

d.innerHTML+=table(set.r,cfg.r,"r",i);
d.innerHTML+=table(set.s,cfg.s,"s",i);
d.innerHTML+=table(set.a,cfg.a,"a",i);

sets.appendChild(d);
});
}

function table(data,items,t,i){
let h="<table border=1><tr><th>名前</th>";
items.forEach(x=>h+=`<th>${x}</th>`);
h+="<th>計算</th></tr>";

Object.keys(data).forEach(p=>{
let total=0;
items.forEach(x=>total+=(data[p][x]||0));

h+=`<tr><td>${p}</td>`;
items.forEach(x=>{
h+=`<td>${data[p][x]||0}<button onclick="inc(${i},'${t}','${p}','${x}')">+</button></td>`;
});

h+=`<td>${calc(t,data[p],total)}</td></tr>`;
});

h+="</table>";
return h;
}

// ===== 計算 =====
function calc(t,d,total){
if(total==0)return "-";

if(t=="r"){
return `ab:${pct((d.a+d.b)/total)} a:${pct(d.a/total)} dm:${pct(d.dm/total)}`;
}
if(t=="s"){
return `効:${pct(((d["◎"]+d["○"])-d["✕"])/total)} ミ:${pct(d["✕"]/total)}`;
}
if(t=="a"){
let dec=d["◎"]/total;
let miss=d["✕"]/total;
return `決:${pct(dec)} 効:${pct(dec-miss)} ミ:${pct(miss)}`;
}
}

function pct(x){return (x*100).toFixed(1)+"%";}

// ===== カウント =====
function inc(i,t,p,x){
let set=db[curCat][date.value][curMatch][i];
if(!set[t][p])set[t][p]={};
if(!set[t][p][x])set[t][p][x]=0;
set[t][p][x]++;
save();renderSets();
}

// ===== 合算 =====
function merge(){
let res={r:{},s:{},a:{}};

document.querySelectorAll(".sel:checked").forEach(c=>{
let set=db[curCat][date.value][curMatch][c.dataset.i];
["r","s","a"].forEach(t=>{
Object.keys(set[t]).forEach(p=>{
if(!res[t][p])res[t][p]={};
Object.keys(set[t][p]).forEach(x=>{
res[t][p][x]=(res[t][p][x]||0)+set[t][p][x];
});
});
});
});

let html="<h3>合算</h3>";
html+=table(res.r,cfg.r);
html+=table(res.s,cfg.s);
html+=table(res.a,cfg.a);

result.innerHTML=html;
}

// ===== 削除 =====
function del(){
let checks=[...document.querySelectorAll(".sel:checked")];
if(!confirm("削除する？"))return;

db[curCat][date.value][curMatch]=db[curCat][date.value][curMatch]
.filter((_,i)=>!checks.find(c=>c.dataset.i==i));

renderSets();save();
}

renderCats();

</script>
</body>
</html>
